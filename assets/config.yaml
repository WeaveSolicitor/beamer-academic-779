# Beamer Academic 配置文件
# 用户只需修改此文件即可定制自己的学术报告主题

# ============================================================
# 学校/机构信息
# ============================================================
institution:
  name: "XX大学"              # 显示在 footline 和封面
  department: "XX学院"        # 院系名称
  logo: ""                    # logo 文件名（放在项目目录下，留空不显示）
  gate_image: ""              # 致谢页的校门/标志建筑图（留空则用纯文字致谢页）

# ============================================================
# 配色方案
# ============================================================
# 预设可选: blue | red | green | purple | teal
color_scheme: "blue"

# 自定义配色（设置后 color_scheme 失效）:
# custom_color:
#   r: 26
#   g: 58
#   b: 92

# ============================================================
# 报告类型
# ============================================================
# 可选: defense (答辩) | proposal (开题) | conference (会议报告)
report_type: "defense"

# ============================================================
# 答辩/报告信息（留空则从论文自动提取）
# ============================================================
presentation:
  title: ""                   # 论文/报告标题
  author: ""                  # 报告人姓名
  supervisor: ""              # 导师姓名+职称（开题/答辩需要）
  major: ""                   # 专业名称（开题/答辩需要）
  date: ""                    # 报告日期（如 "2026年6月"）

# ============================================================
# 生成参数
# ============================================================
generation:
  target_pages: 40            # 目标页数（答辩建议35-50，开题25-35，会议15-25）
  language: "zh"              # zh | en | bilingual
  time_limit: 20              # 报告时间（分钟），影响每页文字量
  aspect_ratio: "43"          # 43 (4:3) | 169 (16:9)
  font_size: "10pt"           # 10pt | 11pt | 12pt

# ============================================================
# 编译设置
# ============================================================
compilation:
  engine: "xelatex"           # xelatex（中文必需）
  runs: 2                     # 编译次数（通常2次）
  # macOS 中文字体（默认）:
  cjk_main: "Songti SC"
  cjk_sans: "Heiti SC"
  cjk_mono: "STFangsong"
  # Linux 中文字体替代:
  # cjk_main: "Noto Serif CJK SC"
  # cjk_sans: "Noto Sans CJK SC"
  # cjk_mono: "Noto Sans Mono CJK SC"
